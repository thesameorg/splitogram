<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary-fixed-dim': '#92ccff',
              'on-error-container': '#ffdad6',
              background: '#131315',
              'on-primary-fixed-variant': '#004b73',
              'surface-container-high': '#2a2a2c',
              outline: '#89929b',
              'tertiary-fixed-dim': '#ffb77a',
              'tertiary-container': '#d37b1e',
              'on-secondary-fixed': '#001d31',
              'surface-container-highest': '#353437',
              surface: '#131315',
              'primary-fixed': '#cce5ff',
              'secondary-container': '#00527e',
              'surface-container': '#1f1f21',
              'secondary-fixed-dim': '#93ccff',
              'on-tertiary-fixed-variant': '#6d3a00',
              'on-secondary-container': '#8bc5f7',
              'on-error': '#690005',
              'surface-container-lowest': '#0e0e10',
              'inverse-on-surface': '#303032',
              'on-secondary-fixed-variant': '#004b73',
              tertiary: '#ffb77a',
              'on-background': '#e5e1e4',
              'outline-variant': '#3f4850',
              'error-container': '#93000a',
              'surface-dim': '#131315',
              'on-primary-fixed': '#001d31',
              error: '#ffb4ab',
              secondary: '#93ccff',
              'tertiary-fixed': '#ffdcc2',
              'surface-tint': '#92ccff',
              'on-tertiary-container': '#432100',
              'primary-container': '#2b98dd',
              'on-primary-container': '#002c47',
              'on-secondary': '#003351',
              'inverse-primary': '#006497',
              'secondary-fixed': '#cce5ff',
              'surface-container-low': '#1b1b1d',
              'surface-bright': '#39393b',
              primary: '#92ccff',
              'on-primary': '#003351',
              'on-surface-variant': '#bfc7d2',
              'on-tertiary': '#4c2700',
              'surface-variant': '#353437',
              'on-tertiary-fixed': '#2e1500',
              'on-surface': '#e5e1e4',
              'inverse-surface': '#e5e1e4',
            },
            fontFamily: {
              headline: ['Manrope'],
              body: ['Manrope'],
              label: ['Manrope'],
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
      body {
        font-family: 'Manrope', sans-serif;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header
      class="sticky top-0 w-full z-50 bg-[#131315]/80 backdrop-blur-xl border-b border-[#3b3b3e]/15"
    >
      <div class="flex items-center justify-between px-4 h-16 w-full">
        <div class="flex items-center gap-4">
          <button
            class="text-[#92CCFF] hover:bg-[#ffffff]/5 transition-colors active:scale-95 duration-200 p-2 rounded-full"
          >
            <span class="material-symbols-outlined">menu</span>
          </button>
          <h1 class="text-[#92CCFF] font-headline font-bold text-lg tracking-tight">Groups</h1>
        </div>
        <div class="flex items-center">
          <button
            class="text-[#92CCFF] hover:bg-[#ffffff]/5 transition-colors active:scale-95 duration-200 p-2 rounded-full"
          >
            <span class="material-symbols-outlined">search</span>
          </button>
        </div>
      </div>
    </header>
    <!-- Main Canvas -->
    <main class="flex-grow flex flex-col items-center justify-center px-8 text-center pb-24">
      <!-- Empty State Visual -->
      <div class="relative mb-8">
        <!-- Decorative Glow Background -->
        <div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full scale-150"></div>
        <!-- Icon Container -->
        <div
          class="relative w-24 h-24 bg-surface-container-high rounded-[2rem] flex items-center justify-center shadow-2xl border border-outline-variant/15"
        >
          <span
            class="material-symbols-outlined text-primary text-5xl"
            style="font-variation-settings: 'FILL' 1"
            >group</span
          >
          <!-- Floating Plus Badge -->
          <div
            class="absolute -bottom-1 -right-1 w-8 h-8 bg-primary rounded-full flex items-center justify-center border-4 border-background shadow-lg"
          >
            <span class="material-symbols-outlined text-on-primary text-xl font-bold">add</span>
          </div>
        </div>
      </div>
      <!-- Typography Content -->
      <h2 class="text-on-surface font-headline font-extrabold text-2xl mb-3 tracking-tight">
        You're all settled up!
      </h2>
      <p class="text-on-surface-variant font-body text-base max-w-[280px] leading-relaxed mb-10">
        Start splitting expenses by creating your first group for a trip, dinner, or shared bills.
      </p>
      <!-- Primary CTA -->
      <button
        class="group relative flex items-center justify-center gap-3 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold px-8 py-4 rounded-lg shadow-[0_8px_25px_rgba(43,152,221,0.3)] active:scale-95 transition-all duration-200 w-full max-w-[280px]"
      >
        <span class="material-symbols-outlined text-2xl">group_add</span>
        <span>Create a Group</span>
      </button>
      <!-- Settled Groups Toggle -->
      <button
        class="mt-8 flex items-center gap-2 text-primary font-headline font-semibold text-sm hover:bg-primary/5 px-4 py-2 rounded-full transition-colors active:scale-95"
      >
        <span class="material-symbols-outlined text-[20px]">visibility</span>
        <span>Show 12 Settled Groups</span>
      </button>
    </main>
    <!-- BottomNavBar -->
    <nav
      class="fixed bottom-0 w-full z-50 pb-safe bg-[#131315]/80 backdrop-blur-xl border-t border-[#3b3b3e]/15"
    >
      <div class="flex justify-around items-center h-16 px-6 w-full">
        <!-- Chats -->
        <a
          class="flex flex-col items-center justify-center text-[#a1a1aa] opacity-70 hover:text-[#92CCFF] transition-all active:scale-90 duration-150"
          href="#"
        >
          <span class="material-symbols-outlined">chat</span>
          <span class="font-['Manrope'] text-[10px] font-medium tracking-wide mt-1">Chats</span>
        </a>
        <!-- Groups (ACTIVE) -->
        <a
          class="flex flex-col items-center justify-center text-[#92CCFF] bg-[#92CCFF]/10 rounded-xl px-4 py-1 active:scale-90 duration-150"
          href="#"
        >
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1"
            >group</span
          >
          <span class="font-['Manrope'] text-[10px] font-bold tracking-wide mt-1">Groups</span>
        </a>
        <!-- Wallets -->
        <a
          class="flex flex-col items-center justify-center text-[#a1a1aa] opacity-70 hover:text-[#92CCFF] transition-all active:scale-90 duration-150"
          href="#"
        >
          <span class="material-symbols-outlined">account_balance_wallet</span>
          <span class="font-['Manrope'] text-[10px] font-medium tracking-wide mt-1">Wallets</span>
        </a>
        <!-- Settings -->
        <a
          class="flex flex-col items-center justify-center text-[#a1a1aa] opacity-70 hover:text-[#92CCFF] transition-all active:scale-90 duration-150"
          href="#"
        >
          <span class="material-symbols-outlined">settings</span>
          <span class="font-['Manrope'] text-[10px] font-medium tracking-wide mt-1">Settings</span>
        </a>
      </div>
    </nav>
  </body>
</html>
