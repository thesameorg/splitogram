<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settle Up - Join Group</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#1f1f21",
                        "tertiary-container": "#009fb2",
                        "on-primary": "#003351",
                        "on-surface": "#e4e2e4",
                        "inverse-primary": "#006497",
                        "surface-dim": "#131315",
                        "on-secondary": "#00344c",
                        "on-secondary-fixed": "#001e2e",
                        "on-secondary-container": "#002d43",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#86cfff",
                        "surface-variant": "#353437",
                        "surface": "#131315",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#00daf3",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2c",
                        "on-tertiary-fixed": "#001f24",
                        "surface-container-highest": "#353437",
                        "surface-container-low": "#1b1b1d",
                        "on-tertiary-fixed-variant": "#004f58",
                        "secondary": "#86cfff",
                        "inverse-surface": "#e4e2e4",
                        "surface-tint": "#92ccff",
                        "on-primary-container": "#002c47",
                        "on-background": "#e4e2e4",
                        "on-tertiary-container": "#002f35",
                        "inverse-on-surface": "#303032",
                        "surface-bright": "#39393b",
                        "primary": "#92ccff",
                        "secondary-fixed": "#c8e6ff",
                        "primary-fixed-dim": "#92ccff",
                        "primary-fixed": "#cce5ff",
                        "error": "#ffb4ab",
                        "outline-variant": "#3f4850",
                        "primary-container": "#2b98dd",
                        "on-tertiary": "#00363d",
                        "secondary-container": "#129ad7",
                        "background": "#131315",
                        "tertiary-fixed": "#9cf0ff",
                        "tertiary": "#00daf3",
                        "on-surface-variant": "#bfc7d2",
                        "on-primary-fixed": "#001d31",
                        "surface-container-lowest": "#0e0e10",
                        "on-secondary-fixed-variant": "#004c6d",
                        "outline": "#89929b",
                        "on-primary-fixed-variant": "#004b73"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-blur {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .diamond-glow {
            background: radial-gradient(circle at center, rgba(146, 204, 255, 0.15) 0%, rgba(19, 19, 21, 0) 70%);
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 flex flex-col overflow-hidden">
<!-- Header (TopAppBar) -->
<header class="fixed top-0 w-full z-50 bg-background/80 ethereal-blur flex items-center justify-between px-6 h-16 border-b border-white/5">
<div class="flex items-center gap-2 active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined text-primary">close</span>
</div>
<h1 class="text-on-surface font-headline font-bold text-lg tracking-tight">Join Group</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<main class="flex-1 flex flex-col items-center pt-24 pb-12 px-8 relative overflow-y-auto">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 diamond-glow pointer-events-none"></div>
<!-- Identity Section -->
<div class="flex flex-col items-center text-center space-y-8 z-10 w-full max-w-sm">
<!-- Avatar with Diamond Accents -->
<div class="relative">
<div class="absolute -inset-4 bg-primary/10 rounded-full blur-2xl animate-pulse"></div>
<div class="relative w-36 h-36 rounded-2xl p-[1px] bg-gradient-to-b from-primary/40 to-transparent overflow-hidden">
<div class="w-full h-full rounded-2xl overflow-hidden bg-surface-container-low shadow-2xl">
<img alt="John Doe" class="w-full h-full object-cover grayscale-[10%]" data-alt="A diverse group of friends hiking through a scenic Icelandic landscape with mountains and waterfalls in the background" src="https://lh3.googleusercontent.com/aida-public/AG8-yX9I8_eKz1lJv9kX_X5W_t-r7x_z_v5_k_q_k_8"/>
</div>
</div>
<!-- Telegram-style Diamond Badge -->
</div>
<!-- Message Block -->
<div class="space-y-3">
<p class="text-primary font-bold text-xs uppercase tracking-[0.2em]">Identity Confirmation</p>
<h2 class="font-headline font-extrabold text-2xl leading-tight tracking-tight px-4">You are joining <span class="text-primary">"Iceland Roadtrip"</span><br/>as <span class="text-primary">"John Doe"</span></h2>
</div>
<!-- Ledger Card -->
<div class="w-full bg-surface-container/50 ethereal-blur rounded-2xl p-6 border border-white/5 shadow-xl relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-5">
<span class="material-symbols-outlined text-6xl">account_balance_wallet</span>
</div>
<p class="text-on-surface-variant font-medium text-[11px] uppercase tracking-widest mb-2">Outstanding Balance</p>
<div class="flex items-baseline justify-center gap-1.5">
<span class="font-headline font-bold text-2xl text-primary">$</span>
<span class="font-headline font-extrabold text-5xl tracking-tighter text-on-surface">123.00</span>
</div>
</div>
<p class="text-on-surface-variant/70 font-medium text-sm italic">
                Proceed only if this is your account.
            </p>
</div>
</main>
<!-- Fixed Action Footer -->
<footer class="p-8 space-y-4 bg-background/80 ethereal-blur border-t border-white/5">
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold text-base rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
            Yes, that's me
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full h-14 bg-white/5 text-on-surface font-headline font-semibold text-base rounded-lg active:scale-[0.98] transition-all border border-white/10 hover:bg-white/10">No, join with $0 balance</button>
<!-- Native Telegram Style Badge -->
<div class="flex items-center justify-center pt-2">
<div class="flex items-center gap-1.5 bg-[#0088CC]/10 px-3 py-1.5 rounded-full border border-[#0088CC]/20">
<span class="material-symbols-outlined text-[14px] text-[#0088CC]" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-[10px] uppercase tracking-wider font-bold text-[#0088CC]">Verified TON Group</span>
</div>
</div>
</footer>
</body></html>
