name = "splitogram"
main = "backend/src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true
head_sampling_rate = 1.0

# D1 Database — create in CF dashboard and replace ID
[[d1_databases]]
binding = "DB"
database_name = "splitogram-db"
database_id = "e422c466-4d70-422a-b451-a8dc0116cc89"
migrations_dir = "backend/drizzle/migrations"

# Non-secret environment variables
[vars]
ENVIRONMENT = "production"
PAGES_URL = "https://splitogram.pages.dev"
# TON settlement (testnet for now — switch to mainnet addresses when ready)
TON_NETWORK = "testnet"
USDT_MASTER_ADDRESS = "kQBDzVlfzubS8ONL25kQNrjoVMF-NwyECbJOfKndeyseWAV7"
SETTLEMENT_CONTRACT_ADDRESS = "EQBWECX8nJ3lk-90IdgLHoINEYvpmACCGnrqT0rTYH0mjgRu"

pages_build_output_dir = "frontend/dist"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "splitogram-images"
